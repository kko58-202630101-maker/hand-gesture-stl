<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STL Gesture Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f6fa;
      --surface:   #ffffff;
      --border:    #e3e6ef;
      --text:      #1a1d2e;
      --muted:     #7b8099;
      --accent:    #3b6ef8;
      --accent-lt: #eef2ff;
      --green:     #22c55e;
      --orange:    #f97316;
      --red:       #ef4444;
      --radius:    12px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    header {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    header .logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    header .logo span { color: var(--text); }
    header .sep {
      width: 1px; height: 20px;
      background: var(--border);
      margin: 0 4px;
    }
    header .tagline {
      font-size: 12px;
      color: var(--muted);
    }
    header .spacer { flex: 1; }
    #status-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      transition: all .2s;
    }
    #status-pill.ready  { background: #f0fdf4; color: var(--green);  border-color: #bbf7d0; }
    #status-pill.warn   { background: #fff7ed; color: var(--orange); border-color: #fed7aa; }
    #status-pill.error  { background: #fef2f2; color: var(--red);    border-color: #fecaca; }

    /* ── 메인 레이아웃 ── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── 3D 뷰어 ── */
    #viewer-wrap {
      flex: 1;
      position: relative;
      background: #f0f2f8;
      overflow: hidden;
    }
    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #three-canvas:active { cursor: grabbing; }

    /* 드래그 오버 */
    #drop-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
      opacity: 1;
      transition: opacity .3s;
    }
    #drop-hint.hidden { opacity: 0; }
    #drop-hint .icon { font-size: 48px; }
    #drop-hint p { font-size: 14px; color: var(--muted); font-weight: 500; }
    #drop-hint small { font-size: 12px; color: #b0b6cc; }

    body.dragging #viewer-wrap { outline: 3px dashed var(--accent); outline-offset: -6px; }
    body.dragging #drop-hint { opacity: 1 !important; }

    /* 웹캠 PiP */
    #pip {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 200px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: var(--shadow-lg);
      background: #111;
    }
    #pip video  { position: absolute; opacity: 0; pointer-events: none; }
    #pip canvas { display: block; width: 100%; }

    /* 현재 제스처 배지 */
    #gesture-badge {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      box-shadow: var(--shadow);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
    }
    #gesture-badge.show { opacity: 1; }

    /* ── 오른쪽 패널 ── */
    #panel {
      width: 272px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* 업로드 */
    #upload-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 0;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      border: none;
    }
    #upload-label:hover { background: #2f5ee0; }
    #file-input { display: none; }

    /* 버튼 컨트롤 그리드 */
    .ctrl-grid {
      display: grid;
      gap: 6px;
    }
    .ctrl-row {
      display: flex;
      gap: 6px;
    }
    .ctrl-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      transition: all .15s;
      user-select: none;
    }
    .ctrl-btn:hover { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }
    .ctrl-btn:active { transform: scale(.96); }
    .ctrl-btn .ci { font-size: 18px; }

    /* 카메라 토글 */
    #cam-btn {
      width: 100%;
      padding: 9px 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #cam-btn:hover { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }
    #cam-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 리셋 */
    #reset-btn {
      width: 100%;
      padding: 9px 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    #reset-btn:hover { background: #fef2f2; border-color: #fecaca; color: var(--red); }

    /* 제스처 가이드 */
    .gesture-list { display: flex; flex-direction: column; gap: 8px; }
    .g-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .g-item .gi { font-size: 20px; min-width: 28px; text-align: center; }
    .g-item .gt { font-size: 12px; }
    .g-item .gt strong { display: block; font-weight: 600; color: var(--text); font-size: 11px; }
    .g-item .gt span { color: var(--muted); font-size: 11px; }

    /* 로딩 */
    #loading {
      position: fixed; inset: 0;
      background: rgba(255,255,255,.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 200;
    }
    #loading.hidden { display: none; }
    #loading p { font-size: 13px; color: var(--muted); font-weight: 500; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 마우스 조작 힌트 */
    #mouse-hint {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
      box-shadow: var(--shadow);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>라이브러리 초기화 중…</p>
</div>

<!-- 헤더 -->
<header>
  <div class="logo">✦ STL<span>Gesture</span></div>
  <div class="sep"></div>
  <div class="tagline">손 제스처로 3D 모델 조작</div>
  <div class="spacer"></div>
  <div id="status-pill">준비 중</div>
</header>

<!-- 메인 -->
<main>
  <!-- 3D 뷰어 -->
  <div id="viewer-wrap">
    <canvas id="three-canvas"></canvas>

    <!-- 빈 화면 안내 -->
    <div id="drop-hint">
      <div class="icon">📦</div>
      <p>STL 파일을 드래그하거나 업로드하세요</p>
      <small>Binary / ASCII STL 모두 지원</small>
    </div>

    <!-- 제스처 배지 -->
    <div id="gesture-badge">대기 중</div>

    <!-- 마우스 힌트 -->
    <div id="mouse-hint">
      🖱 드래그: 회전 &nbsp;|&nbsp; Shift+드래그: 이동 &nbsp;|&nbsp; 휠: 줌
    </div>

    <!-- 웹캠 PiP -->
    <div id="pip">
      <video id="webcam-video" autoplay playsinline muted></video>
      <canvas id="hand-canvas"></canvas>
    </div>
  </div>

  <!-- 오른쪽 패널 -->
  <div id="panel">

    <!-- 파일 업로드 -->
    <div class="panel-section">
      <div class="section-label">파일</div>
      <input type="file" id="file-input" accept=".stl" />
      <label for="file-input" id="upload-label">
        <span>📂</span> STL 파일 업로드
      </label>
    </div>

    <!-- 버튼 컨트롤 -->
    <div class="panel-section">
      <div class="section-label">버튼 조작</div>
      <div class="ctrl-grid">
        <!-- 회전 -->
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-rot-left">
            <span class="ci">↺</span>왼쪽 회전
          </button>
          <button class="ctrl-btn" id="btn-rot-right">
            <span class="ci">↻</span>오른쪽 회전
          </button>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-rot-up">
            <span class="ci">↑</span>위 회전
          </button>
          <button class="ctrl-btn" id="btn-rot-down">
            <span class="ci">↓</span>아래 회전
          </button>
        </div>
        <!-- 이동 -->
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-move-left">
            <span class="ci">⬅</span>왼쪽
          </button>
          <button class="ctrl-btn" id="btn-move-right">
            <span class="ci">➡</span>오른쪽
          </button>
          <button class="ctrl-btn" id="btn-move-up">
            <span class="ci">⬆</span>위
          </button>
          <button class="ctrl-btn" id="btn-move-down">
            <span class="ci">⬇</span>아래
          </button>
        </div>
        <!-- 줌 -->
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-zoom-in">
            <span class="ci">🔍+</span>확대
          </button>
          <button class="ctrl-btn" id="btn-zoom-out">
            <span class="ci">🔍−</span>축소
          </button>
        </div>
      </div>
    </div>

    <!-- 카메라 & 리셋 -->
    <div class="panel-section">
      <div class="section-label">카메라</div>
      <button id="cam-btn">📷 손 인식 시작</button>
    </div>
    <div class="panel-section">
      <button id="reset-btn">🔄 뷰 초기화</button>
    </div>

    <!-- 제스처 가이드 -->
    <div class="panel-section">
      <div class="section-label">손 제스처 가이드</div>
      <div class="gesture-list">
        <div class="g-item">
          <span class="gi">☝️</span>
          <div class="gt">
            <strong>검지 1개</strong>
            <span>손목 움직임 → 회전</span>
          </div>
        </div>
        <div class="g-item">
          <span class="gi">✌️</span>
          <div class="gt">
            <strong>검지 + 중지</strong>
            <span>손목 움직임 → 이동</span>
          </div>
        </div>
        <div class="g-item">
          <span class="gi">👍</span>
          <div class="gt">
            <strong>엄지만 위로</strong>
            <span>유지 → 확대</span>
          </div>
        </div>
        <div class="g-item">
          <span class="gi">🤙</span>
          <div class="gt">
            <strong>엄지+새끼만</strong>
            <span>유지 → 축소</span>
          </div>
        </div>
        <div class="g-item">
          <span class="gi">✋</span>
          <div class="gt">
            <strong>손 펼침 (4개+)</strong>
            <span>정지</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script src="main.js"></script>
</body>
</html>
