<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STL Gesture Viewer Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Pretendard',sans-serif;
  background:#f5f7fb;
  overflow:hidden;
  color:#222;
}

#app{
  display:flex;
  width:100vw;
  height:100vh;
}

/* =======================
   Viewer
======================= */

#viewer-container{
  flex:1;
  position:relative;
  background:linear-gradient(
    180deg,
    #ffffff 0%,
    #edf4ff 100%
  );
}

#three-canvas{
  width:100%;
  height:100%;
  display:block;
}

/* =======================
   Webcam
======================= */

#webcam-wrapper{
  position:absolute;
  bottom:20px;
  right:20px;

  width:280px;

  border-radius:20px;

  overflow:hidden;

  background:white;

  box-shadow:
  0 10px 30px rgba(0,0,0,.12);

  border:1px solid #e8edf5;
}

#webcam-video{
  position:absolute;
  opacity:0;
  pointer-events:none;
}

#hand-canvas{
  width:100%;
  display:block;
}

/* =======================
   Sidebar
======================= */

#ui-panel{

  width:320px;

  background:white;

  display:flex;

  flex-direction:column;

  gap:18px;

  padding:24px;

  box-shadow:
  -8px 0 24px rgba(0,0,0,.06);

  overflow-y:auto;
}

.logo{

  text-align:center;
}

.logo h1{

  font-size:22px;

  color:#4f8cff;

  margin-bottom:6px;
}

.logo p{

  font-size:13px;

  color:#777;
}

/* =======================
   Upload
======================= */

#file-input{
  display:none;
}

#upload-btn{

  display:block;

  width:100%;

  text-align:center;

  padding:14px;

  border-radius:14px;

  background:#4f8cff;

  color:white;

  font-weight:600;

  cursor:pointer;

  transition:.2s;
}

#upload-btn:hover{

  transform:translateY(-2px);
}

.card{

  background:white;

  border:1px solid #edf1f7;

  border-radius:16px;

  padding:16px;

  box-shadow:
  0 4px 15px rgba(0,0,0,.04);
}

.card-title{

  font-size:14px;

  font-weight:700;

  margin-bottom:12px;
}

#status-badge{

  text-align:center;

  padding:12px;

  border-radius:12px;

  background:#f4f7fc;

  color:#666;

  font-size:13px;
}

#current-gesture{

  text-align:center;

  padding:14px;

  border-radius:12px;

  background:#eef4ff;

  border:1px solid #d9e7ff;

  color:#4f8cff;

  font-weight:600;
}

/* =======================
   Buttons
======================= */

.controls{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:10px;
}

.control-btn{

  border:none;

  padding:12px;

  border-radius:12px;

  background:#4f8cff;

  color:white;

  font-weight:600;

  cursor:pointer;

  transition:.2s;
}

.control-btn:hover{

  transform:translateY(-2px);
}

.control-btn.secondary{

  background:#eef4ff;

  color:#4f8cff;
}

.arrow-grid{

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:8px;
}

.arrow-grid button{

  border:none;

  border-radius:12px;

  background:#eef4ff;

  color:#4f8cff;

  padding:12px;

  font-size:18px;

  cursor:pointer;
}

.guide-item{

  display:flex;

  gap:12px;

  margin-bottom:12px;
}

.guide-icon{

  font-size:22px;
}

.guide-text{

  font-size:13px;

  line-height:1.5;
}

.guide-text strong{

  display:block;

  margin-bottom:2px;
}

#loading{

  position:fixed;

  inset:0;

  background:white;

  display:flex;

  align-items:center;

  justify-content:center;

  flex-direction:column;

  gap:15px;

  z-index:999;
}

#loading.hidden{
  display:none;
}

.spinner{

  width:45px;
  height:45px;

  border-radius:50%;

  border:4px solid #dce7ff;

  border-top:4px solid #4f8cff;

  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <div>STL Viewer 로딩중...</div>
</div>

<div id="app">

  <div id="viewer-container">

    <canvas id="three-canvas"></canvas>

    <div id="webcam-wrapper">
      <video
        id="webcam-video"
        autoplay
        playsinline
        muted>
      </video>

      <canvas id="hand-canvas"></canvas>
    </div>

  </div>

  <div id="ui-panel">

    <div class="logo">
      <h1>✋ STL Viewer Pro</h1>
      <p>Hand Gesture Control</p>
    </div>
      <!-- 업로드 -->
    <div class="card">

      <input
        type="file"
        id="file-input"
        accept=".stl">

      <label for="file-input" id="upload-btn">
        📂 STL 파일 업로드
      </label>

    </div>

    <!-- 상태 -->
    <div class="card">

      <div class="card-title">
        상태
      </div>

      <div id="status-badge">
        STL 파일을 업로드하세요
      </div>

    </div>

    <!-- 현재 제스처 -->
    <div class="card">

      <div class="card-title">
        현재 제스처
      </div>

      <div id="current-gesture">
        대기중...
      </div>

    </div>

    <!-- 카메라 -->
    <div class="card">

      <div class="card-title">
        카메라
      </div>

      <button
        id="cam-btn"
        class="control-btn">
        📷 카메라 켜기
      </button>

    </div>

    <!-- 확대 축소 -->
    <div class="card">

      <div class="card-title">
        확대 / 축소
      </div>

      <div class="controls">

        <button
          id="zoomInBtn"
          class="control-btn">
          ➕ 확대
        </button>

        <button
          id="zoomOutBtn"
          class="control-btn">
          ➖ 축소
        </button>

      </div>

    </div>

    <!-- 회전 -->
    <div class="card">

      <div class="card-title">
        회전
      </div>

      <div class="controls">

        <button
          id="rotateLeftBtn"
          class="control-btn secondary">
          ↺ 왼쪽
        </button>

        <button
          id="rotateRightBtn"
          class="control-btn secondary">
          ↻ 오른쪽
        </button>

      </div>

    </div>

    <!-- 이동 -->
    <div class="card">

      <div class="card-title">
        이동
      </div>

      <div class="arrow-grid">

        <div></div>

        <button id="moveUpBtn">
          ⬆
        </button>

        <div></div>

        <button id="moveLeftBtn">
          ⬅
        </button>

        <button id="reset-btn">
          🔄
        </button>

        <button id="moveRightBtn">
          ➡
        </button>

        <div></div>

        <button id="moveDownBtn">
          ⬇
        </button>

        <div></div>

      </div>

    </div>

    <!-- 제스처 설명 -->
    <div class="card">

      <div class="card-title">
        제스처 가이드
      </div>

      <div class="guide-item">
        <div class="guide-icon">☝️</div>
        <div class="guide-text">
          <strong>회전</strong>
          검지 하나
        </div>
      </div>

      <div class="guide-item">
        <div class="guide-icon">✌️</div>
        <div class="guide-text">
          <strong>이동</strong>
          검지 + 중지
        </div>
      </div>

      <div class="guide-item">
        <div class="guide-icon">👍</div>
        <div class="guide-text">
          <strong>확대</strong>
          엄지 위
        </div>
      </div>

      <div class="guide-item">
        <div class="guide-icon">👎</div>
        <div class="guide-text">
          <strong>축소</strong>
          엄지 아래
        </div>
      </div>

      <div class="guide-item">
        <div class="guide-icon">✊</div>
        <div class="guide-text">
          <strong>초기화</strong>
          주먹 쥐기
        </div>
      </div>

      <div class="guide-item">
        <div class="guide-icon">✋</div>
        <div class="guide-text">
          <strong>정지</strong>
          손바닥 펼치기
        </div>
      </div>

    </div>

    <!-- 키보드 -->
    <div class="card">

      <div class="card-title">
        키보드 단축키
      </div>

      <div style="font-size:13px;line-height:1.8;color:#666">

        ← → 회전<br>
        ↑ ↓ 확대/축소<br>
        R 초기화

      </div>

    </div>

  </div>

</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script src="main.js"></script>

</body>
</html>
